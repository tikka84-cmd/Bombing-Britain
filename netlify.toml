# Netlify configuration for the static React app.
# The app lives in /app; Netlify builds from there and publishes app/dist.
#
# IMPORTANT: the map data artefact app/public/raids.geojson is gitignored while
# the dataset's reuse licence is unresolved, so a git-connected build will NOT
# include it (the live site would show its error state). Until the data can be
# committed (licence resolved) or generated during the build, deploy from a local
# build with the CLI, which uploads app/dist with the data without committing it:
#
#   cd app
#   npm run build                      # data already in app/public via 05_build
#   netlify deploy --dir=dist          # draft URL for review
#   netlify deploy --dir=dist --prod   # production

[build]
  base = "app"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback: serve index.html for client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
