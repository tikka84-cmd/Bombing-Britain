# Netlify configuration for the static React app.
# The app lives in /app; Netlify builds from there and publishes app/dist.
# The map data (app/public/raids.geojson) is committed, so a git-connected Netlify
# build works out of the box: connect the GitHub repo in the Netlify dashboard and
# it auto-deploys on every push. No CLI needed.

[build]
  base = "app"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback: serve index.html for client-side routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
